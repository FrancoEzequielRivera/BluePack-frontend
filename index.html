<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio sesión — BluePack</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="auth-page">

    <div class="auth-wrapper">

        <!-- Logo -->
        <div class="brand">
            <h1 class="brand-logo">
                <span class="brand-blue">Blue</span><span class="brand-white">Pack</span>
            </h1>
            <p class="brand-sub">Correo Internacional</p>
        </div>

        <!-- Card -->
        <div class="auth-card">
            <h2 class="card-title">Iniciar sesión</h2>

            <!-- Mensaje de error -->
            <div class="alert alert-error" id="error-msg" role="alert" aria-live="polite"></div>

            <div class="form-group">
                <label for="email">Nombre/Correo electrónico</label>
                <input
                    type="email"
                    id="email"
                    placeholder="pack@mail.com"
                    autocomplete="email"
                    required
                >
            </div>

            <div class="form-group">
                <label for="password">Contraseña</label>
                <input
                    type="password"
                    id="password"
                    placeholder="Contraseña123"
                    autocomplete="current-password"
                    required
                >
            </div>

            <button class="btn-primary" id="btn-login">Acceder</button>
        </div>

    </div>

    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/index.js"></script>
</body>
</html>
