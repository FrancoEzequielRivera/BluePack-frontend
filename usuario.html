<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usuario — BluePack</title>
    <link rel="stylesheet" href="css/usuario.css">
</head>
<body class="panel-page">

    <!-- ═══ HEADER ═══ -->
    <header class="panel-header">
        <div class="brand">
            <div class="brand-logo">
                <span class="brand-blue">Blue</span><span class="brand-white">Pack</span>
            </div>
            <div class="brand-sub">Correo Internacional</div>
        </div>

        <div class="header-user">
            <span id="nombre-usuario"></span>
            <a href="tracking.html"><button class="btn-primary" id="">Tracking</button></a>
            <button class="btn-primary" id="btn-nuevo-pedido-header">
                Nuevo pedido
            </button>
            <button class="btn-logout" id="btn-logout">Cerrar sesión</button>
        </div>
    </header>

    <!-- ═══ CONTENIDO ═══ -->
    <main class="panel-content">

        <!-- Alerta global (éxito / error de acciones) -->
        <div class="alert" id="alerta-global" role="alert" aria-live="polite"></div>

        <!-- ─── Mis pedidos ─── -->
        <section class="section-card" id="seccion-pedidos">
            <h2 class="section-title">Mis pedidos</h2>

            <div class="alert alert-error" id="error-tabla" role="alert"></div>

            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Destino</th>
                            <th>Estado</th>
                            <th>Fecha</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="tabla-body">
                        <tr>
                            <td colspan="5" class="empty-state">Cargando pedidos...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>

        <!-- ─── Nuevo pedido ─── -->
        <section class="section-card" id="seccion-nuevo-pedido">
            <h2 class="section-title">Nuevo pedido</h2>

            <div class="alert alert-error" id="error-form" role="alert"></div>

            <div id="form-nuevo-pedido">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="origen">Origen</label>
                        <input type="text" id="origen" placeholder="Ej: Corrientes 1234, CABA">
                    </div>

                    <div class="form-group">
                        <label for="destinatario">Destinatario</label>
                        <input type="text" id="destinatario" placeholder="Nombre completo">
                    </div>

                    <div class="form-group">
                        <label for="destino">Destino</label>
                        <input type="text" id="destino" placeholder="Ej: San Martín 500, Rosario">
                    </div>

                    <div class="form-group">
                        <label for="telefono">Celular</label>
                        <input type="tel" id="telefono" placeholder="+54 341 555-1234">
                    </div>

                    <div class="form-group full-width">
                        <label for="descripcion">Descripción</label>
                        <textarea id="descripcion" placeholder="Ej: Caja con libros"></textarea>
                    </div>

                    <div class="form-group">
                        <label for="pesoKg">Peso en Kg</label>
                        <input type="number" id="pesoKg" placeholder="Ej: 2.5"
                            min="0.01" step="0.01">
                    </div>
                </div>

                <div style="margin-top: 24px; text-align: center;">
                    <button class="btn-primary" id="btn-crear-pedido"
                        style="max-width: 300px;"
                        onclick="document.getElementById('form-nuevo-pedido').dispatchEvent(new Event('submit'))">
                        Crear pedido
                    </button>
                </div>
            </div>
        </section>

    </main>

    <!-- ═══ MODAL DE DETALLE ═══ -->
    <div class="modal-overlay" id="modal-overlay" role="dialog" aria-modal="true">
        <div class="modal">
            <div class="modal-header">
                <h3>Detalle del pedido</h3>
                <button class="modal-cerrar-btn" id="modal-cerrar" aria-label="Cerrar">✕</button>
            </div>
            <div class="modal-cuerpo" id="modal-cuerpo"></div>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/api.js"></script>
    <script src="js/usuario.js"></script>
    <script>
        // Conectar el submit del formulario
        document.getElementById("form-nuevo-pedido")
            .addEventListener("submit", handleCrearPedido)
    </script>

</body>
</html>
